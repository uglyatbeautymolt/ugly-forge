# nginx Konfiguration für dashboard.beautymolt.com
# Kopieren nach: /etc/nginx/conf.d/forge-dashboard.conf
# oder in ugly-stack nginx-Konfiguration einbinden

server {
    listen 80;
    server_name dashboard.beautymolt.com;

    # HTTP -> HTTPS Weiterleitung (wenn SSL konfiguriert)
    # return 301 https://$server_name$request_uri;

    location / {
        proxy_pass http://forge-dashboard:3001;
        proxy_http_version 1.1;

        # WebSocket Support (kritisch!)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts für WebSocket (lange Verbindungen)
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        # Kein Buffering für Realtime
        proxy_buffering off;
    }
}

